name: Build and Release

on:
  push:
    tags:
      - 'v*'

# 1. リリース作成のために書き込み権限を明示的に追加
permissions:
  contents: write

# 2. Node.js 24を使用するように環境変数を設定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish
      run: dotnet publish CodeZipTool.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o ./publish

    - name: Build Installer (Inno Setup)
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /F"CodeZipTool_Setup"

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: CodeZipTool_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}